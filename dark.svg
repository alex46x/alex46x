      <g font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12.5">
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.1s" dur=".45s" fill="freeze"/><text x="500" y="276" fill="#64748b">01</text><text x="532" y="276" fill="#94a3b8">location</text><text x="625" y="276" fill="#f8fafc">Dhaka, Bangladesh</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.35s" dur=".45s" fill="freeze"/><text x="500" y="301" fill="#64748b">02</text><text x="532" y="301" fill="#94a3b8">education</text><text x="625" y="301" fill="#f8fafc">Computer Science &amp; Engineering</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.6s" dur=".45s" fill="freeze"/><text x="500" y="326" fill="#64748b">03</text><text x="532" y="326" fill="#94a3b8">focus</text><text x="625" y="326" fill="#f8fafc">Security · Systems · Web</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.85s" dur=".45s" fill="freeze"/><text x="500" y="351" fill="#64748b">04</text><text x="532" y="351" fill="#94a3b8">portfolio</text><text x="625" y="351" fill="#22d3ee">github.com/alex46x</text></g>
        <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.1s" dur=".45s" fill="freeze"/><text x="500" y="376" fill="#64748b">05</text><text x="532" y="376" fill="#94a3b8">email</text><text x="625" y="376" fill="#f8fafc">available on request</text></g>
      </g>

      <text x="500" y="416" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="2">TOOLBOX</text>
      <g font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11.5" fill="#e2e8f0">
        <g id="p1"><rect x="500" y="430" width="65" height="30" rx="15" fill="#7c3aed" fill-opacity=".13" stroke="#8b5cf6" stroke-opacity=".45"><animate attributeName="stroke-opacity" values=".35;.8;.35" dur="3s" repeatCount="indefinite"/></rect><text x="532.5" y="449" text-anchor="middle">React</text><animateTransform attributeName="transform" type="scale" values="1;1.03;1" begin="p1.mouseover" dur=".35s"/></g>
        <g id="p2"><rect x="573" y="430" width="69" height="30" rx="15" fill="#22d3ee" fill-opacity=".1" stroke="#22d3ee" stroke-opacity=".38"/><text x="607.5" y="449" text-anchor="middle">Next.js</text><animateTransform attributeName="transform" type="scale" values="1;1.03;1" begin="p2.mouseover" dur=".35s"/></g>
        <g id="p3"><rect x="650" y="430" width="66" height="30" rx="15" fill="#10b981" fill-opacity=".1" stroke="#34d399" stroke-opacity=".38"/><text x="683" y="449" text-anchor="middle">Node.js</text></g>
        <g><rect x="724" y="430" width="91" height="30" rx="15" fill="#7c3aed" fill-opacity=".1" stroke="#8b5cf6" stroke-opacity=".4"/><text x="769.5" y="449" text-anchor="middle">TypeScript</text></g>
        <g><rect x="823" y="430" width="75" height="30" rx="15" fill="#22d3ee" fill-opacity=".1" stroke="#22d3ee" stroke-opacity=".38"/><text x="860.5" y="449" text-anchor="middle">Tailwind</text></g>
        <g><rect x="906" y="430" width="67" height="30" rx="15" fill="#10b981" fill-opacity=".1" stroke="#34d399" stroke-opacity=".38"/><text x="939.5" y="449" text-anchor="middle">Python</text></g>
        <g><rect x="981" y="430" width="65" height="30" rx="15" fill="#7c3aed" fill-opacity=".1" stroke="#8b5cf6" stroke-opacity=".4"/><text x="1013.5" y="449" text-anchor="middle">Docker</text></g>
        <g><rect x="1054" y="430" width="54" height="30" rx="15" fill="#22d3ee" fill-opacity=".1" stroke="#22d3ee" stroke-opacity=".38"/><text x="1081" y="449" text-anchor="middle">Git</text></g>
        <g><rect x="500" y="466" width="78" height="30" rx="15" fill="#10b981" fill-opacity=".1" stroke="#34d399" stroke-opacity=".38"/><text x="539" y="485" text-anchor="middle">Postgres</text></g>
        <g><rect x="586" y="466" width="54" height="30" rx="15" fill="#7c3aed" fill-opacity=".1" stroke="#8b5cf6" stroke-opacity=".4"/><text x="613" y="485" text-anchor="middle">AWS</text></g>
        <g><rect x="648" y="466" width="60" height="30" rx="15" fill="#22d3ee" fill-opacity=".1" stroke="#22d3ee" stroke-opacity=".38"/><text x="678" y="485" text-anchor="middle">Figma</text></g>
