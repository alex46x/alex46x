      <text x="798" y="89" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="1.2">PROFILE — ZSH — 118 × 42</text>

      <g opacity="0"><animate attributeName="opacity" values="0;1" begin=".3s" dur=".6s" fill="freeze"/>
        <text x="500" y="149" fill="#94a3b8" font-size="17">Hi</text><path d="M526 145c4-7 8-11 12-8 3 2-1 7 1 8 3 1 7-9 11-6 3 2-2 8 0 9 2 1 6-6 9-3 5 5-3 15-14 15-9 0-16-7-19-15Z" fill="url(#accent)"/>
        <text x="500" y="190" fill="#f8fafc" font-size="31" font-weight="650" letter-spacing="-.8">I'm </text><text x="562" y="190" fill="url(#accent)" font-size="31" font-weight="750" letter-spacing="-.8">Alex46x</text>
      </g>

