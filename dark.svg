<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
  <title id="title">Alex46x — developer profile</title>
  <desc id="desc">Animated terminal-style profile banner for Alex46x, a CSE student and software developer.</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#030712"/><stop offset=".52" stop-color="#07101f"/><stop offset="1" stop-color="#030712"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#7c3aed"><animate attributeName="stop-color" values="#7c3aed;#22d3ee;#7c3aed" dur="8s" repeatCount="indefinite"/></stop><stop offset=".5" stop-color="#22d3ee"><animate attributeName="stop-color" values="#22d3ee;#10b981;#22d3ee" dur="8s" repeatCount="indefinite"/></stop><stop offset="1" stop-color="#10b981"><animate attributeName="stop-color" values="#10b981;#7c3aed;#10b981" dur="8s" repeatCount="indefinite"/></stop></linearGradient>
    <linearGradient id="glass" x2="0" y2="1"><stop stop-color="#fff" stop-opacity=".09"/><stop offset=".15" stop-color="#fff" stop-opacity=".025"/><stop offset="1" stop-color="#0f172a" stop-opacity=".58"/></linearGradient>
    <linearGradient id="shine" x1="-1" x2="0"><stop stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff" stop-opacity=".4"/><stop offset="1" stop-color="#fff" stop-opacity="0"/><animate attributeName="x1" values="-1;1" dur="6s" repeatCount="indefinite"/><animate attributeName="x2" values="0;2" dur="6s" repeatCount="indefinite"/></linearGradient>
    <radialGradient id="orbA"><stop stop-color="#2563eb" stop-opacity=".24"/><stop offset="1" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
    <radialGradient id="orbB"><stop stop-color="#7c3aed" stop-opacity=".21"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
    <radialGradient id="orbC"><stop stop-color="#10b981" stop-opacity=".14"/><stop offset="1" stop-color="#10b981" stop-opacity="0"/></radialGradient>
    <pattern id="noise" width="17" height="19" patternUnits="userSpaceOnUse"><circle cx="2" cy="4" r=".45" fill="#fff" opacity=".1"/><circle cx="13" cy="8" r=".35" fill="#fff" opacity=".08"/><circle cx="7" cy="16" r=".3" fill="#fff" opacity=".07"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".45"/></filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
    <clipPath id="frame"><rect x="1" y="1" width="1178" height="608" rx="32"/></clipPath>
    <clipPath id="portraitClip"><rect x="48" y="80" width="392" height="450" rx="24"/></clipPath>
    <mask id="asciiReveal"><rect x="0" y="0" width="0" height="610" fill="white"><animate attributeName="width" values="0;430;430" keyTimes="0;.75;1" dur="4.8s" fill="freeze"/></rect></mask>
    <mask id="roleReveal"><rect x="0" y="0" width="0" height="40" fill="white"><animate attributeName="width" values="0;410;410;0" keyTimes="0;.36;.82;1" dur="12s" repeatCount="indefinite"/></rect></mask>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1180" height="610" fill="url(#bg)"/>
    <circle cx="120" cy="70" r="280" fill="url(#orbA)" filter="url(#soft)"><animateTransform attributeName="transform" type="translate" values="0 0;65 34;0 0" dur="13s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="85" r="250" fill="url(#orbB)" filter="url(#soft)"><animateTransform attributeName="transform" type="translate" values="0 0;-55 62;0 0" dur="16s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="570" r="250" fill="url(#orbC)" filter="url(#soft)"><animateTransform attributeName="transform" type="translate" values="0 0;-80 -25;0 0" dur="14s" repeatCount="indefinite"/></circle>
    <rect width="1180" height="610" fill="url(#noise)" opacity=".34"/>

    <g fill="#22d3ee" opacity=".35">
      <circle cx="82" cy="132" r="1.4"><animateMotion path="M0 0 C 24 -35 48 16 75 -30" dur="9s" repeatCount="indefinite"/></circle>
      <circle cx="1120" cy="480" r="1.2"><animateMotion path="M0 0 C -32 -22 -42 28 -80 -12" dur="11s" repeatCount="indefinite"/></circle>
      <circle cx="530" cy="555" r="1"><animate attributeName="opacity" values=".1;.7;.1" dur="3.5s" repeatCount="indefinite"/></circle>
      <circle cx="780" cy="55" r="1.3"><animate attributeName="opacity" values=".15;.65;.15" dur="4.3s" repeatCount="indefinite"/></circle>
    </g>

    <rect x="28" y="28" width="1124" height="554" rx="28" fill="#fff" fill-opacity=".025" stroke="#fff" stroke-opacity=".1" filter="url(#shadow)"/>
    <rect x="29" y="29" width="1122" height="552" rx="27" fill="none" stroke="url(#shine)" stroke-width="2"/>

    <!-- portrait terminal -->
    <g>
      <rect x="48" y="56" width="392" height="498" rx="24" fill="#0f172a" fill-opacity=".66" stroke="#fff" stroke-opacity=".09"/>
      <path d="M72 57H416Q439 57 439 80V110H49V80Q49 57 72 57Z" fill="url(#glass)"/>
      <circle cx="76" cy="84" r="5" fill="#fb7185"/><circle cx="94" cy="84" r="5" fill="#fbbf24"/><circle cx="112" cy="84" r="5" fill="#34d399"/>
      <text x="244" y="89" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="1.5">ALEX.ASC</text>
      <g clip-path="url(#portraitClip)">
        <g mask="url(#asciiReveal)" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="18" font-weight="700" fill="url(#accent)" filter="url(#glow)">
          <g><animateTransform attributeName="transform" type="translate" values="0 0;0 -7;0 0" dur="6s" repeatCount="indefinite"/>
            <text x="73" y="151" opacity="0">             .+******+.<animate attributeName="opacity" values="0;0;1" keyTimes="0;.03;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="175" opacity="0">          .+##########+.<animate attributeName="opacity" values="0;0;1" keyTimes="0;.1;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="199" opacity="0">        .################.<animate attributeName="opacity" values="0;0;1" keyTimes="0;.17;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="223" opacity="0">       +######+..+#######+<animate attributeName="opacity" values="0;0;1" keyTimes="0;.24;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="247" opacity="0">      +####+.      .+####+<animate attributeName="opacity" values="0;0;1" keyTimes="0;.31;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="271" opacity="0">      ####+  &lt;•&gt;  &lt;•&gt; +####<animate attributeName="opacity" values="0;0;1" keyTimes="0;.38;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="295" opacity="0">      ####.    /\    .####<animate attributeName="opacity" values="0;0;1" keyTimes="0;.45;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="319" opacity="0">       ####.  ____  .####<animate attributeName="opacity" values="0;0;1" keyTimes="0;.52;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="343" opacity="0">        +####+....+####+<animate attributeName="opacity" values="0;0;1" keyTimes="0;.59;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="367" opacity="0">          +########+<animate attributeName="opacity" values="0;0;1" keyTimes="0;.66;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="391" opacity="0">       .+############+.<animate attributeName="opacity" values="0;0;1" keyTimes="0;.73;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="415" opacity="0">     .##################.<animate attributeName="opacity" values="0;0;1" keyTimes="0;.8;1" dur="2.8s" fill="freeze"/></text>
            <text x="73" y="439" opacity="0">    +####################+<animate attributeName="opacity" values="0;0;1" keyTimes="0;.87;1" dur="2.8s" fill="freeze"/></text>
          </g>
        </g>
        <rect x="52" y="112" width="384" height="2" fill="#22d3ee" opacity=".5" filter="url(#glow)"><animate attributeName="y" values="112;538;112" dur="5.5s" repeatCount="indefinite"/></rect>
      </g>
      <text x="74" y="505" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12">alex@github:~$ render --profile</text>
      <rect x="330" y="493" width="7" height="15" rx="1" fill="#22d3ee"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></rect>
      <rect x="62" y="470" width="364" height="1" fill="#fff" opacity=".07"/>
    </g>

    <!-- profile terminal -->
    <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
