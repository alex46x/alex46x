      <g transform="translate(500 518) scale(.82)" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <g><path d="M12 1.5a10.5 10.5 0 0 0-3.3 20.5c.5.1.7-.2.7-.5v-2c-3 .7-3.7-1.3-3.7-1.3-.5-1.3-1.2-1.7-1.2-1.7-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 1.7 2.6 1.2 3.2.9.1-.7.4-1.2.7-1.5-2.4-.3-4.9-1.2-4.9-5.2 0-1.2.4-2.1 1.1-2.8-.1-.3-.5-1.4.1-2.8 0 0 .9-.3 2.9 1.1a10 10 0 0 1 5.3 0c2-1.4 2.9-1.1 2.9-1.1.6 1.4.2 2.5.1 2.8.7.7 1.1 1.6 1.1 2.8 0 4-2.5 4.9-4.9 5.2.4.3.7 1 .7 2v3c0 .3.2.6.7.5A10.5 10.5 0 0 0 12 1.5Z"/><text x="32" y="17" fill="#94a3b8" stroke="none" font-family="ui-sans-serif, system-ui" font-size="12">GitHub</text></g>
        <g transform="translate(118)"><rect x="2" y="2" width="20" height="20" rx="4"/><path d="M7 10v7M7 7v.1M11 17v-4c0-3 6-3 6 0v4M11 10v7"/><text x="32" y="17" fill="#64748b" stroke="none" font-family="ui-sans-serif, system-ui" font-size="12">LinkedIn</text></g>
        <g transform="translate(250)"><path d="M21 6c-.7.3-1.5.5-2.3.6A4 4 0 0 0 20.5 4a8 8 0 0 1-2.6 1 4 4 0 0 0-6.9 2.7c0 .3 0 .6.1.9A11.4 11.4 0 0 1 2.8 4.4a4 4 0 0 0 1.2 5.4c-.7 0-1.3-.2-1.8-.5 0 2 1.4 3.6 3.3 4-.4.1-.7.1-1.1.1-.3 0-.5 0-.8-.1.5 1.6 2 2.8 3.8 2.8A8.1 8.1 0 0 1 2.4 18c-.3 0-.6 0-1-.1a11.4 11.4 0 0 0 6.2 1.8c7.4 0 11.5-6.2 11.5-11.5v-.5c.8-.5 1.4-1.1 1.9-1.7Z"/><text x="32" y="17" fill="#64748b" stroke="none" font-family="ui-sans-serif, system-ui" font-size="12">Twitter</text></g>
        <g transform="translate(365)"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2c3 3 4 6.3 4 10s-1 7-4 10c-3-3-4-6.3-4-10s1-7 4-10Z"/><text x="32" y="17" fill="#64748b" stroke="none" font-family="ui-sans-serif, system-ui" font-size="12">Portfolio</text></g>
